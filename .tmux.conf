# enable utf-8 on status bar
set -g status on
# setw -gq utf8 on
# set-option status-utf8 on

# scrolling within Terminal.app (https://unix.stackexchange.com/questions/81540/how-can-i-page-up-or-down-in-tmux-with-terminal-app/81795)
set -g mouse on
# enable Ctrl-Up Ctrl-Down scrolling
set-window-option -g mode-keys vi

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# List of plugins
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'powerline/powerline'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'

set -g @continuum-restore 'on'

# https://superuser.com/questions/491897/tmux-forgets-the-directory-where-the-session-was-created
bind-key c new-window -c "#{pane_current_path}"
bind-key e setw synchronize-panes

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
